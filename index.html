.park-en{font-family:"Cinzel",serif;font-weight:700;font-size:clamp(14px,1.6vw,20px);letter-spacing:.05em;line-height:1.1}
.park-ja{font-size:10px;letter-spacing:.24em;color:var(--brass);font-weight:500}
.hspace{flex:1}
.wx{display:flex;align-items:center;gap:8px;padding:5px 12px;border-radius:10px;
  background:rgba(243,233,210,.10);border:1px solid rgba(201,162,39,.4);font-size:12px;line-height:1.25}
.wx .wico{font-size:21px}
.wx .wtemp{font-family:"Shippori Mincho",serif;font-weight:700;font-size:16px}
.wx .wsub{color:#aeb9d6;font-size:10.5px}
.wx .weff{color:#f0c14b;font-weight:700;font-size:11px}
.clock-plate{text-align:right;font-family:"Shippori Mincho",serif;line-height:1.15}
.clock-time{font-size:clamp(18px,2.2vw,25px);font-weight:700;font-variant-numeric:tabular-nums}
.clock-date{font-size:11px;color:#c9d3e8}
.clock-date .holiday{color:#f0c14b;font-weight:700}
.status-chip{display:inline-block;padding:2px 9px;border-radius:999px;font-size:10.5px;font-weight:700;font-family:"Zen Kaku Gothic New",sans-serif}
.status-open{background:rgba(46,107,69,.25);color:#8fd6a8;border:1px solid #3f7d57}
.status-closed{background:rgba(120,60,50,.3);color:#f0b3a3;border:1px solid #8f4a38}
.status-before{background:rgba(176,117,20,.22);color:#f0c97b;border:1px solid #a5822d}
.hbtns{display:flex;flex-direction:column;gap:4px}
.btn{font-family:inherit;font-weight:700;font-size:11.5px;cursor:pointer;
  padding:5px 12px;border-radius:8px;border:1px solid var(--brass);
  background:linear-gradient(180deg,#fbf3dd,#eadfbd);color:var(--navy);transition:transform .1s ease}
.btn:hover{transform:translateY(-1px)}
.btn:active{transform:scale(.97)}
.btn:focus-visible{outline:3px solid #ffd75e;outline-offset:2px}
.countdown{font-size:10px;color:#aeb9d6;text-align:center;font-variant-numeric:tabular-nums}
.countdown b{color:#f0c14b}

main{flex:1 1 auto;min-height:0;display:flex;gap:6px}
.map-card{flex:0 0 auto;position:relative;border-radius:14px;overflow:hidden;
  border:2px solid var(--brass);background:#0e1830;height:100%;aspect-ratio:2/3;max-width:52%}
.map-inner{position:relative;height:100%}
.map-inner img{display:block;height:100%;width:100%;object-fit:cover}
.pin{position:absolute;transform:translate(-50%,-100%);display:flex;flex-direction:column;align-items:center;
  cursor:pointer;z-index:5;background:none;border:none;-webkit-tap-highlight-color:transparent}
.pin:focus-visible{outline:3px solid #ffd75e;outline-offset:2px;border-radius:8px}
.chip{display:flex;align-items:center;gap:4px;padding:3px 8px 3px 5px;border-radius:8px;
  background:linear-gradient(180deg,#fbf3dd,#eadfbd);border:1.5px solid var(--brass-dark);
  box-shadow:0 2px 8px rgba(0,0,0,.55);font-weight:700;font-size:clamp(10px,0.95vw,13.5px);
  white-space:nowrap;color:var(--navy);font-variant-numeric:tabular-nums;transition:transform .15s ease;font-family:inherit}
.pin:hover .chip{transform:scale(1.14)}
.chip .ico{width:15px;height:15px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:8px;color:#fff;flex-shrink:0}
.ico-attr{background:var(--brass-dark)}.ico-rest{background:var(--copper)}
.chip.w-ok .min{color:var(--ok)}.chip.w-warn .min{color:var(--warn)}.chip.w-bad .min{color:var(--bad)}
.chip.w-closed .min{color:#8a7a55;font-size:.9em}
.chip.w-maint{background:linear-gradient(180deg,#e3e7ef,#cfd6e3);border-color:var(--maint)}
.chip.w-maint .min{color:#41527a;font-size:.9em}
.pin-stem{width:2px;height:7px;background:var(--brass-dark)}
.pin.active .chip{transform:scale(1.2);border-color:#fff;box-shadow:0 0 0 2px var(--brass),0 3px 10px rgba(0,0,0,.6)}
.tip{position:absolute;z-index:20;pointer-events:none;background:var(--navy);color:var(--parchment);
  border:1.5px solid var(--brass);border-radius:10px;padding:9px 12px;font-size:12.5px;max-width:250px;min-width:150px;
  box-shadow:0 6px 22px rgba(0,0,0,.6);opacity:0;transition:opacity .15s}
.tip.show{opacity:1}
@keyframes hilite{
  0%,100%{box-shadow:0 0 0 2px var(--brass),0 3px 10px rgba(0,0,0,.6)}
  50%{box-shadow:0 0 0 7px rgba(240,193,75,.85),0 3px 14px rgba(0,0,0,.7)}
}
.pin.hilite .chip{animation:hilite 0.7s ease-in-out 4;transform:scale(1.25);border-color:#fff}
.tip .t-name{font-family:"Shippori Mincho",serif;font-weight:700;font-size:13.5px;margin-bottom:2px}
.tip .t-wait{font-weight:700;color:#f0c14b}
.tip .t-area{color:#9fb0d0;font-size:11px;margin-top:1px}

.side{flex:1 1 auto;min-width:0;display:flex;flex-direction:column;gap:8px}
.quake-banner{display:none;flex:0 0 auto;padding:7px 12px;border-radius:10px;
  background:#7a2a1a;border:1px solid #e08560;color:#ffe9dd;font-size:11.5px;line-height:1.5}
.quake-banner.show{display:block;animation:pulse 2.4s ease-in-out infinite}
.quake-banner b{color:#ffd75e}
.gauge-card{flex:0 0 auto;background:linear-gradient(180deg,var(--card),var(--parchment));
  border:1px solid var(--brass);border-radius:12px;padding:8px 14px}
.gauge-head{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:4px}
.gauge-label{font-family:"Shippori Mincho",serif;font-weight:700;font-size:12.5px;color:var(--navy)}
.gauge-num{font-family:"Shippori Mincho",serif;font-weight:800;font-size:19px;color:var(--navy);font-variant-numeric:tabular-nums}
.gauge-num small{font-size:11px;font-weight:600;color:#6b5d3f}
.fc-level{font-family:"Shippori Mincho",serif;font-weight:800;font-size:16px}
.gauge-bar{margin-top:5px;height:11px;border-radius:999px;background:#ddceac;border:1px solid #b8a476;overflow:hidden}
.gauge-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#3f7d57,#c9a227 60%,#b4452f);transition:width .8s ease}
.gauge-note{margin-top:4px;font-size:10px;color:#7a6b48;line-height:1.45}
.restrict-banner{display:none;margin-top:5px;padding:5px 10px;border-radius:7px;background:var(--copper);
  color:#fff4e8;font-weight:700;font-size:11.5px;text-align:center}
.restrict-banner.show{display:block;animation:pulse 2.4s ease-in-out infinite}
@keyframes pulse{50%{opacity:.82}}

.lists{flex:1 1 auto;min-height:0;display:flex;gap:8px}
.col{flex:1;min-width:0;display:flex;flex-direction:column;min-height:0;
  background:rgba(243,233,210,.07);border:1px solid rgba(201,162,39,.35);border-radius:12px;padding:8px}
.col h2{font-family:"Shippori Mincho",serif;font-weight:700;font-size:13px;color:var(--parchment);
  letter-spacing:.08em;padding:0 4px 6px;display:flex;justify-content:space-between;align-items:baseline}
.col h2 .lg{font-size:9.5px;color:#8fa0c4;font-weight:500;letter-spacing:0}
.rows{flex:1;min-height:0;overflow:auto;display:flex;flex-direction:column;gap:4px;scrollbar-width:thin}
.row{display:flex;align-items:center;gap:7px;background:linear-gradient(180deg,var(--card),#f2e7cc);
  border:1px solid #c9b87e;border-left:4px solid var(--brass-dark);border-radius:8px;
  padding:5px 9px;cursor:pointer;transition:transform .1s ease;flex:1;min-height:30px}
.row:hover{transform:translateX(2px)}
.row:focus-visible{outline:3px solid #ffd75e;outline-offset:1px}
.row.rest{border-left-color:var(--copper)}
.row.fac{border-left-color:#2a7d78}
.row.down{background:linear-gradient(180deg,#e9ecf2,#d8dde8);border-left-color:var(--maint);border-color:#a9b3c9}
.row .r-rank{font-family:"Cinzel",serif;font-weight:700;font-size:11px;color:#a08a4a;width:14px;text-align:center;flex-shrink:0}
.row .r-body{flex:1;min-width:0;line-height:1.15}
.row .r-name{font-weight:700;font-size:clamp(11px,0.95vw,13.5px);color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ppb{color:#6b4fa3;font-weight:700}
.tip .t-pp{color:#cdb6f5;font-weight:700;font-size:11.5px;margin-bottom:2px}
.row .r-area{font-size:9.5px;color:#8a7a55;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .r-wait{font-family:"Shippori Mincho",serif;font-weight:800;font-size:17px;flex-shrink:0;font-variant-numeric:tabular-nums;text-align:right}
.row .r-wait small{font-size:9px;font-weight:600}
.r-wait.w-ok{color:var(--ok)}.r-wait.w-warn{color:var(--warn)}.r-wait.w-bad{color:var(--bad)}
.r-wait.w-closed{color:#8a7a55;font-size:9.5px;font-weight:700}
.r-wait.w-maint{color:#41527a;font-size:9.5px;font-weight:700;line-height:1.2}
.rest-col{display:flex;flex-direction:column;min-height:0}
.legend{flex:0 0 auto;display:flex;gap:10px;flex-wrap:wrap;font-size:10.5px;color:#c9d3e8;padding:7px 4px 1px}
.legend span{display:inline-flex;align-items:center;gap:4px}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.foot{flex:0 0 auto;font-size:9px;color:#8fa0c4;line-height:1.5;padding:5px 4px 0}
.foot .upd{color:#c9d3e8;font-variant-numeric:tabular-nums}

.event-banner{flex:0 0 auto;padding:7px 12px;border-radius:10px;text-align:center;
  background:linear-gradient(90deg,#7a4a12,#a5761f 50%,#7a4a12);border:1px solid #e0b45e;
  color:#ffedc4;font-size:12px;font-weight:700;letter-spacing:.04em}
.event-banner .eb-days{color:#fff;font-size:14px}
.shows-card{flex:0 0 auto;background:rgba(27,42,74,.55);border:1px solid rgba(120,150,220,.45);border-radius:12px;padding:8px 10px}
.shows-title{font-family:"Shippori Mincho",serif;font-weight:700;font-size:12.5px;color:#cdd8f2;letter-spacing:.08em;padding:0 2px 6px}
.shows-row{display:flex;gap:6px;overflow-x:auto;scrollbar-width:thin}
.show-card{flex:1 1 0;min-width:150px;background:linear-gradient(180deg,#22355e,#1a2a4c);
  border:1px solid #3d5385;border-radius:9px;padding:6px 9px;cursor:pointer;color:#e8edf8;
  transition:transform .1s ease}
.show-card:hover{transform:translateY(-2px)}
.show-card .sc-name{font-weight:700;font-size:11.5px;line-height:1.25;color:#fff}
.show-card .sc-venue{font-size:9.5px;color:#93a6cf;margin-top:1px}
.show-card .sc-status{font-size:11px;font-weight:700;margin-top:3px;font-variant-numeric:tabular-nums}
.sc-live{color:#7fe0a5}.sc-soon{color:#ffd75e}.sc-up{color:#9fc2ff}.sc-done{color:#8b97b5}.sc-maint{color:#e8a1a1}
.ico-show{background:#3a5aa8}.ico-well{background:#2a7d78}.ico-svc{background:#5a6b8c}
.sheet-backdrop{display:none;position:fixed;inset:0;background:rgba(10,16,30,.62);z-index:100;align-items:flex-end;justify-content:center}
.sheet-backdrop.show{display:flex}
.sheet{position:relative;width:min(680px,100%);max-height:82vh;overflow-y:auto;
  background:linear-gradient(180deg,#fbf5e6,#f3e9d2);border:2px solid var(--brass);border-bottom:none;
  border-radius:18px 18px 0 0;padding:18px 20px 24px;box-shadow:0 -8px 40px rgba(0,0,0,.6)}
.sheet-close{position:absolute;top:10px;right:12px;width:30px;height:30px;border-radius:50%;
  border:1px solid var(--brass-dark);background:#efe3c4;color:var(--navy);font-weight:700;cursor:pointer;font-size:13px}
.sh-cat{font-size:11px;color:#8a7a55;letter-spacing:.06em}
.sh-name{font-family:"Shippori Mincho",serif;font-weight:800;font-size:19px;color:var(--navy);line-height:1.3;margin:2px 0}
.sh-area{font-size:12px;color:#7a6b48;margin-bottom:8px}
.sh-live{background:var(--navy);color:var(--parchment);border-radius:10px;padding:9px 12px;margin-bottom:10px;font-size:13px;line-height:1.6}
.sh-live b{color:#f0c14b}
.sh-live .ppb2{color:#cdb6f5;font-weight:700}
.sh-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px}
.sh-tag{font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:999px;background:#e8dcba;color:#5a4c2a;border:1px solid #cbb87f}
.sh-tag.warn{background:#f3d9cf;color:#8a3a22;border-color:#d09a83}
.sh-tagline{font-family:"Shippori Mincho",serif;font-weight:700;font-size:14px;color:var(--forest);margin-bottom:6px}
.sh-desc{font-size:13px;line-height:1.8;color:var(--ink);margin-bottom:10px}
.sh-meta{font-size:12px;color:#6b5d3f;margin-bottom:8px}
.sh-menus{margin-top:4px}
.sh-menus .m-title{font-size:11.5px;font-weight:700;color:#8a7a55;margin-bottom:4px}
.sh-menus ul{list-style:none;display:flex;flex-wrap:wrap;gap:5px}
.sh-menus li{font-size:12px;background:#fff8e8;border:1px solid #d8c896;border-radius:8px;padding:3px 10px;color:var(--navy)}
.sh-note{margin-top:10px;font-size:11.5px;color:#8a5a2a;background:#f7ecd2;border-left:3px solid var(--brass);padding:6px 10px;border-radius:0 8px 8px 0}
@media (max-width:900px), (orientation:portrait) and (max-width:1100px){
  .event-banner{margin-bottom:8px}
  .shows-card{margin-bottom:8px}
  .sheet{border-radius:18px 18px 0 0}
  html,body{height:auto}
  .app{height:auto;display:block}
  header{flex-wrap:wrap;margin-bottom:8px}
  main{display:block}
  .map-card{max-width:100%;height:auto;aspect-ratio:auto;margin-bottom:8px}
  .map-inner{height:auto}
  .map-inner img{height:auto;object-fit:contain}
  .side{display:block}
  .quake-banner{margin-bottom:8px}
  .gauge-card{margin-bottom:8px}
  .lists{display:block}
  .col{margin-bottom:8px}
  .rows{overflow:visible}
  .row{min-height:34px}
  .clock-plate{order:5}
}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
</style>

/* 休演・変更・中止の手動上書き（運営データ）。例: {"lulu-jazz":"cancelled"} */
const SHOW_STATUS_OVERRIDE={};
function showTimes(e,d){
  if (e.timeGen){
    const a=[];for(let x=e.timeGen.start;x<=CLOSE_H-e.timeGen.durationMin/60+1e-9;x+=e.timeGen.intervalMin/60)a.push(Math.round(x*100)/100);
    return a;
  }
  return e.times||[];
}
function showActive(e,d){
  if (e.activeRule==="daily") return true;
  if (e.activeRule==="summer_event") return isSummerEvent(d);
  if (e.activeRule==="christmas_event") return isChristmasEvent(d);
  if (e.activeRule==="normal_period") return !isSummerEvent(d)&&!isChristmasEvent(d);
  return false;
}
function showMaintOf(id,d){
  const r=SHOW_MAINT[id];if(!r)return null;
  const md=mmdd(d);return (md>=r[0]&&md<=r[1])?r:null;
}
/* 状態: {st:"dark"|"maint"|"cancel"|"upcoming"|"soon"|"live"|"done", ...} */
function showStatus(e,d,tt){
  if (!showActive(e,d)) return {st:"dark"};
  const mr=showMaintOf(e.id,d);
  if (mr) return {st:"maint",range:mr};
  if (SHOW_STATUS_OVERRIDE[e.id]==="cancelled") return {st:"cancel"};
  const dur=(e.timeGen?e.timeGen.durationMin:e.durationMin)/60;
  const ts=showTimes(e,d);
  for (const s of ts){
    if (tt>=s&&tt<s+dur) return {st:"live",start:s,end:s+dur};
  }
  const next=ts.find(s=>s>tt);
  if (next==null) return {st:"done"};
  return {st:next-tt<=10/60?"soon":"upcoming",start:next,end:next+dur,minutesTo:Math.round((next-tt)*60)};
}
/* 本日のハーバーショー差し替え判定 */
function todaysEntertainment(d){
  const list=[ENTERTAINMENT.find(e=>e.id==="lulu-jazz"),ENTERTAINMENT.find(e=>e.id==="mallowbrook-story-parade")];
  if (isChristmasEvent(d)) list.push(ENTERTAINMENT.find(e=>e.id==="christmas-harbor"));
  else if (isSummerEvent(d)) list.push(ENTERTAINMENT.find(e=>e.id==="summer-matsuri-beat"));
  else list.push(ENTERTAINMENT.find(e=>e.id==="lantern-mystique"));
  return list;
}
/* 夏イベントの暦日カウントダウン（JSTの年月日に正規化） */
function summerBannerInfo(now){
  const y=now.getFullYear();
  const today=new Date(y,now.getMonth(),now.getDate());
  const md=mmdd(now);
  if (md>=801&&md<=831){
    const last=new Date(y,7,31);
    const left=Math.round((last-today)/86400000);
    return {mode:"during",days:left};
  }
  if (md>=901&&md<=930) return {mode:"ended"};
  const ty=md>930?y+1:y;
  const target=new Date(ty,7,1);
  return {mode:"before",days:Math.round((target-today)/86400000)};
}

const HNAME_EN={"元日":"New Year's Day","成人の日":"Coming of Age Day","建国記念の日":"National Foundation Day",
 "天皇誕生日":"Emperor's Birthday","春分の日":"Vernal Equinox Day","昭和の日":"Showa Day","憲法記念日":"Constitution Day",
 "みどりの日":"Greenery Day","こどもの日":"Children's Day","海の日":"Marine Day","山の日":"Mountain Day",

 "文化の日":"Culture Day","勤労感謝の日":"Labor Thanksgiving Day","振替休日":"Substitute Holiday","国民の休日":"National Holiday"};
const HOLIDAY_CACHE={};
function yearHolidays(y){
  if (HOLIDAY_CACHE[y]) return HOLIDAY_CACHE[y];
  const map={};
  const add=(m,d,n)=>{map[m+"-"+d]=n;};
  const nthMon=(m,n)=>{const first=new Date(y,m-1,1).getDay();return 1+((8-first)%7)+(n-1)*7;};
  add(1,1,"元日");
  add(1,nthMon(1,2),"成人の日");
  add(2,11,"建国記念の日");
  add(2,23,"天皇誕生日");
  add(3,Math.floor(20.8431+0.242194*(y-1980))-Math.floor((y-1980)/4),"春分の日");
  add(4,29,"昭和の日");
  add(5,3,"憲法記念日"); add(5,4,"みどりの日"); add(5,5,"こどもの日");
  add(7,nthMon(7,3),"海の日");
  add(8,11,"山の日");
  add(9,nthMon(9,3),"敬老の日");
  add(9,Math.floor(23.2488+0.242194*(y-1980))-Math.floor((y-1980)/4),"秋分の日");
  add(10,nthMon(10,2),"スポーツの日");
  add(11,3,"文化の日"); add(11,23,"勤労感謝の日");
  /* 振替休日：日曜と重なった祝日の直後の非祝日 */
  Object.keys(Object.assign({},map)).forEach(k=>{
    const [m,d]=k.split("-").map(Number);
    if (new Date(y,m-1,d).getDay()===0){
      let nd=new Date(y,m-1,d+1);
      while (map[(nd.getMonth()+1)+"-"+nd.getDate()]) nd=new Date(y,nd.getMonth(),nd.getDate()+1);
      if (nd.getFullYear()===y) map[(nd.getMonth()+1)+"-"+nd.getDate()]="振替休日";
    }
  });
  /* 国民の休日：祝日に挟まれた平日（シルバーウィーク等） */
  for (let m=1;m<=12;m++) for (let d=2;d<=30;d++){
    const cur=new Date(y,m-1,d);
    if (cur.getMonth()!==m-1||map[m+"-"+d]||cur.getDay()===0) continue;
    const nx=new Date(y,m-1,d+1);
    if (map[m+"-"+(d-1)]&&map[(nx.getMonth()+1)+"-"+nx.getDate()]) map[m+"-"+d]="国民の休日";
  }
  HOLIDAY_CACHE[y]=map;
  return map;
}
function holidayOf(d){
  const y=d.getFullYear();
  if (y<2025||y>2035) return null;
  return yearHolidays(y)[(d.getMonth()+1)+"-"+d.getDate()]||null;
}
function holidayPair(d){
  const n=holidayOf(d);
  return n?[n,HNAME_EN[n]||n]:null;
}
/* ================= 混雑区分と入場ペース（案B×案C複合） =================
   普通(火水木)＝案B / 混雑(休日・月曜・金曜)＝案B寄りC / 超混雑(連休中日)＝案C /
   特異日(暦上のサージ日)＝案C超え */
const ULTRA_DAYS={101:"元日",504:"GW中日",814:"お盆ピーク",1031:"ハロウィン",1224:"クリスマスイブ",1225:"クリスマス"};
function isOffDay(d){const w=d.getDay();return w===0||w===6||!!holidayOf(d);}
function addDays(d,n){return new Date(d.getFullYear(),d.getMonth(),d.getDate()+n);}
function isHolidayMiddle(d){
  return isOffDay(d)&&isOffDay(addDays(d,-1))&&isOffDay(addDays(d,1));
}
function rampLevel(d){
  const md=mmdd(d);
  if (ULTRA_DAYS[md]) return {lv:3,name:ULTRA_DAYS[md]};
  if (isHolidayMiddle(d)) return {lv:2,name:null};
  const w=d.getDay();
  if (isOffDay(d)||w===1||w===5) return {lv:1,name:null};
  return {lv:0,name:null};
}
/* [入場中心時刻, 傾き] lv0:案B lv1:混雑 lv2:案C lv3:特異日 */
const RAMP=[[9.9,1.7],[9.8,1.85],[9.7,2.0],[9.5,2.6]];

/* ================= プライオリティパス（PP） =================
   30分区切りの優先入場パス。1日の配布量(stock)は固定で、
   需要(想定来場者数×取得率k)が在庫を上回る混雑日は早く配布終了となる。
   人気順に取得率が高く、在庫比も厳しいため、人気アトラクションほど先に終了する */
const PP={
  chase:  {k:0.160, stock:9000},
  rail:   {k:0.120, stock:7400},
  dam:    {k:0.120, stock:7400},
  wheel:  {k:0.100, stock:6450},
  factory:{k:0.085, stock:5740},
  voyage: {k:0.075, stock:5230},
};
const PP_FIRST=10.0, PP_LAST=21.5, PP_SLOTS=24;   /* 10:00〜21:30開始の30分枠×24 */
/* 発券の進行カーブ：入場ペース(混雑区分に連動)と時間経過のブレンド。
   混雑日・特異日ほど序盤に集中し、早い時間に在庫が尽きる */
function ppIssueCurve(tt,d){
  const poly=Math.pow(Math.max(0,(tt-OPEN_H)/7),0.75);   /* 〜16時で配り切る形 */
  return Math.min(1,0.5*cumulativeEntry(tt,d)+0.5*poly);
}
function ppInfo(id,d,tt,attTotal){
  const cfg=PP[id]; if(!cfg) return null;
  const demandAll=attTotal*cfg.k;
  /* 配布終了時刻＝累計発券需要が在庫に達する時刻 */
  let endT=null;
  if (demandAll>cfg.stock){
    for (let x=OPEN_H;x<=CLOSE_H;x+=1/12){
      if (demandAll*ppIssueCurve(x,d)>=cfg.stock){endT=Math.round(x*12)/12;break;}
    }
  }
  if (endT!=null&&tt>=endT) return {state:"end",endT};
  const issued=Math.min(cfg.stock,demandAll*ppIssueCurve(tt,d));
  let slot=PP_FIRST+Math.floor(issued/cfg.stock*PP_SLOTS)*0.5;
  const minSlot=Math.ceil((tt+1)*2)/2;            /* 現在+1時間以降の枠から配布 */
  slot=Math.max(slot,minSlot);
  if (slot>PP_LAST) return {state:"end",endT:endT??tt};
  return {state:"now",slot,endT};
}
function ppText(id,d,tt,attTotal,status,forecast){
  if (!PP[id]) return null;
  if (status&&status.st==="maint") return LANG==="ja"?"PP発券なし":"No PP today";
  if (status&&status.st!=="open") return LANG==="ja"?"PP発券一時停止":"PP paused";
  if (!forecast&&(tt<OPEN_H||tt>=CLOSE_H)) return null;
  const info=ppInfo(id,d,forecast?OPEN_H+0.01:tt,attTotal);
  if (forecast){
    if (info.endT) return (LANG==="ja"?"PP終了予想 ":"PP est. end ")+fmtT(info.endT)+(LANG==="ja"?"頃":"");
    return LANG==="ja"?"PP終日配布見込み":"PP available all day (est.)";
  }
  if (info.state==="end") return (LANG==="ja"?"PP本日分終了":"PP sold out")+(info.endT?"（"+fmtT(info.endT)+"）":"");
  return (LANG==="ja"?"PP発券中 ":"PP now: ")+fmtT(info.slot)+"–"+fmtT(info.slot+0.5);
}
const WD_JA=["日","月","火","水","木","金","土"], WD_EN=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const dateKey=d=>d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
const mmdd=d=>(d.getMonth()+1)*100+d.getDate();
function seasonInfo(d){
  const m=d.getMonth()+1, md=mmdd(d);
  if (md>=429&&md<=506) return {ja:"ゴールデンウィーク",en:"Golden Week",mul:1.30};
  if (md>=808&&md<=816) return {ja:"お盆",en:"Obon",mul:1.28};
  if (md>=718&&md<=831) return {ja:"夏休みシーズン",en:"Summer break",mul:1.15};
  if (md>=320&&md<=405) return {ja:"春休みシーズン",en:"Spring break",mul:1.10};
  if (md>=1220||md<=103) return {ja:"年末年始",en:"Year-end",mul:1.12};
  if (m===6) return {ja:"梅雨",en:"Rainy season",mul:0.85};
  if (m===1||m===2) return {ja:"冬季",en:"Winter",mul:0.85};
  return {ja:null,en:null,mul:1.0};
}
function inboundInfo(d){
  const m=d.getMonth()+1, md=mmdd(d);
  if (md>=210&&md<=224) return {mul:2.3,ja:"春節",en:"Lunar New Year"};
  if (md>=1001&&md<=1007) return {mul:2.1,ja:"国慶節",en:"Golden Week (CN)"};
  if (m===7||m===8) return {mul:1.5,ja:null,en:null};
  if (m===12) return {mul:1.3,ja:null,en:null};
  if (m===4) return {mul:1.25,ja:"桜シーズン",en:"Cherry blossom"};
  return {mul:1.0,ja:null,en:null};
}
function hash32(s){let h=2166136261>>>0;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
function rand01(s){let x=hash32(s);x^=x<<13;x>>>=0;x^=x>>17;x^=x<<5;x>>>=0;return (x%100000)/100000;}
const fmtT=tt=>{const h=Math.floor(tt),m=Math.round((tt-h)*60);return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0");};

/* ================= 天候（東京固定・日没つき） ================= */
let WX={ok:false,temp:null,mul:1.0,condKey:null,icon:"…",sunset:null};
const SUNSET_FALLBACK=[16.9,17.4,17.9,18.3,18.7,19.0,19.0,18.6,17.9,17.2,16.6,16.5];
function wxCategory(code,temp){
  let key,mul,icon;
  if (code===0){key="clear";mul=1.0;icon="☀️";}
  else if (code===1){key="sunny";mul=1.0;icon="🌤️";}
  else if (code===2||code===3){key="cloudy";mul=0.97;icon="☁️";}
  else if (code>=45&&code<=48){key="fog";mul=0.95;icon="🌫️";}
  else if (code>=51&&code<=57){key="drizzle";mul=0.85;icon="🌦️";}
  else if (code===64||code===65||code===82){key="heavyrain";mul=0.55;icon="🌧️";}
  else if ((code>=61&&code<=63)||code===80||code===81||code===66||code===67){key="rain";mul=0.70;icon="🌧️";}
  else if ((code>=71&&code<=77)||code===85||code===86){key="snow";mul=0.60;icon="❄️";}
  else if (code>=95){key="storm";mul=0.50;icon="⛈️";}
  else {key="cloudy";mul=0.95;icon="☁️";}
  if (temp!=null&&temp>=33) mul*=0.92;
  if (temp!=null&&temp<=3) mul*=0.92;
  return {key,mul,icon};
}
function sunsetH(){return WX.sunset??SUNSET_FALLBACK[new Date().getMonth()];}

/* ================= 地震情報（P2P地震情報API・実データ） ================= */
let QUAKE={active:false,mode:null,info:null,untilH:null};
const scaleName=s=>({10:"1",20:"2",30:"3",40:"4",45:"5弱",50:"5強",55:"6弱",60:"6強",70:"7"})[s]||"?";
async function fetchQuake(){
  try{
    const j=await (await fetch("https://api.p2pquake.net/v2/history?codes=551&limit=10")).json();
    const now=Date.now();
    QUAKE={active:false,mode:null,info:null,untilH:null};
    for (const q of j){
      if (!q.earthquake) continue;
      const qt=new Date(q.earthquake.time.replace(/\//g,"-"));
      if (isNaN(qt)) continue;
      const ageH=(now-qt.getTime())/3600000;
      if (ageH<0||ageH>3) continue;
      const tokyoPts=(q.points||[]).filter(p=>p.pref==="東京都");
      if (!tokyoPts.length) continue;
      const tokyoMax=Math.max(...tokyoPts.map(p=>p.scale));
      if (tokyoMax<30) continue;
      const hy=q.earthquake.hypocenter||{};
      QUAKE.active=true;
      QUAKE.info={time:qt,name:hy.name||"—",mag:hy.magnitude,maxScale:q.earthquake.maxScale,tokyoScale:tokyoMax};
      if (tokyoMax>=45){QUAKE.mode="all";}
      else {QUAKE.mode="big";QUAKE.untilH=qt.getHours()+qt.getMinutes()/60+1.5;}
      break;
    }
  }catch(e){/* ネットワーク不可時は現状維持 */}
  renderQuake();
}
function renderQuake(){
  const b=document.getElementById("quakeBanner");
  if (!QUAKE.active){b.classList.remove("show");b.innerHTML="";return;}
  const q=QUAKE.info;
  const ts=`${q.time.getMonth()+1}/${q.time.getDate()} ${String(q.time.getHours()).padStart(2,"0")}:${String(q.time.getMinutes()).padStart(2,"0")}`;
  const eff=QUAKE.mode==="all"?t("quakeAll"):t("quakeBig")+fmtT(QUAKE.untilH)+t("quakeBig2");
  b.innerHTML=`<b>🌏 ${t("quakeTitle")}</b>｜${ts} ${q.name} M${q.mag??"?"} ${t("maxInt")}${scaleName(q.maxScale)}（${t("tokyoInt")}${scaleName(q.tokyoScale)}）<br>${eff}`;
  b.classList.add("show");
}

/* ================= 運営ステータス（優先度: 長期メンテ > 地震 > 臨時点検 > 日没） ================= */
function maintOf(id,d){
  const r=MAINT[id]; if(!r) return null;
  const md=mmdd(d);
  return (md>=r[0]&&md<=r[1])?r:null;
}
/* 臨時点検：調子が悪い日(約8%)は同日に2〜3回発生。
   再開見込み(告知)より早く復帰することがあり、復帰判定は毎分行う（開始30分後から毎分5%） */
function conditionBad(id,d){return rand01("cond-"+dateKey(d)+"-"+id)<0.08;}
function inspectionsOf(id,d){
  if (maintOf(id,d)) return [];
  const key=dateKey(d);
  const bad=conditionBad(id,d);
  let n=0;
  if (bad) n=2+(rand01("inspn-"+key+"-"+id)<0.35?1:0);
  else if (rand01("insp-"+key+"-"+id)<0.10) n=1;
  if (!n) return [];
  const wins=[];
  let cursor=9.5;
  for (let k=0;k<n;k++){
    const span=(CLOSE_H-1-cursor)/(n-k);
    let start=cursor+rand01("insps-"+key+"-"+id+"-"+k)*Math.max(0.2,span-1);
    start=Math.round(start*12)/12;
    const maxDur=CLOSE_H-start;
    let dur=bad?0.5+rand01("inspd-"+key+"-"+id+"-"+k)*1.5:0.5+rand01("inspd-"+key+"-"+id+"-"+k)*(maxDur-0.5);
    dur=Math.max(0.5,Math.round(dur*12)/12);
    const schedEnd=Math.min(CLOSE_H,start+dur);
    let actualEnd=schedEnd;
    for (let m=Math.ceil((start+0.5)*60);m<Math.floor(schedEnd*60);m++){
      if (rand01("inspr-"+key+"-"+id+"-"+m)<0.015){actualEnd=m/60;break;}
    }
    wins.push({start,schedEnd,actualEnd,idx:k+1,n,bad});
    cursor=schedEnd+0.75;
    if (cursor>=CLOSE_H-0.6) break;
  }
  return wins;
}
function spotStatus(s,d,tt){
  if (s.type!=="a") return {st:"open"};
  const mr=maintOf(s.id,d);
  if (mr) return {st:"maint",range:mr};
  if (QUAKE.active){
    if (QUAKE.mode==="all") return {st:"quake"};
    if (QUAKE.mode==="big"&&s.big&&tt<QUAKE.untilH) return {st:"quake",until:QUAKE.untilH};
  }
  const wins=inspectionsOf(s.id,d);
  for (const w of wins){
    if (tt>=w.start&&tt<w.actualEnd)
      return {st:"insp",until:w.schedEnd>=21.9?null:w.schedEnd,idx:w.idx,n:wins.length,bad:w.bad};
  }
  if (s.sunset&&tt>=sunsetH()) return {st:"sunset"};
  return {st:"open"};
}
/* 休止分の需要が稼働中アトラクションへ再配分される係数 */
function redistFactor(d,tt){
  const attrs=SPOTS.filter(s=>s.type==="a");
  const totalPop=attrs.reduce((a,s)=>a+s.pop,0);
  const activePop=attrs.filter(s=>spotStatus(s,d,tt).st==="open").reduce((a,s)=>a+s.pop,0);
  if (activePop<=0) return 1;
  return Math.min(1.5,Math.pow(totalPop/activePop,0.8));
}

/* ================= 来場者数モデル ================= */
function dailyAttendance(d){
  const key=dateKey(d),dow=d.getDay();
  const holiday=holidayPair(d);
  let base;
  if (holiday) base=68000;
  else if (dow===6) base=64000;
  else if (dow===0) base=56000;
  else if (dow===5||dow===1) base=40000;   /* 金曜・月曜＝混雑 */
  else base=29000;                          /* 火水木＝普通 */
  const rl=rampLevel(d);
  if (rl.lv===2) base=Math.max(base,71000); /* 連休中日＝超混雑 */
  if (rl.lv===3) base=Math.max(base,68000); /* 暦上の特異日 */
  const season=seasonInfo(d);
  const domestic=Math.round(base*season.mul*(0.92+rand01("att-"+key)*0.16)*WX.mul/100)*100;
  const inb=inboundInfo(d);
  const inbound=Math.round(7000*inb.mul*(0.92+rand01("inb-"+key)*0.16)*(0.5+0.5*WX.mul)/100)*100;
  return {total:Math.min(MAX_CAP,domestic+inbound),domestic,inbound,holiday,season,inb};
}
function occupancyCurve(tt,d){
  if (tt<=OPEN_H||tt>=CLOSE_H) return 0;
  const [c0,k]=RAMP[rampLevel(d).lv];
  const rise=1/(1+Math.exp(-(tt-c0)*k));
  const fall=1/(1+Math.exp(-(tt-20.8)*1.10));
  let c=Math.max(0,rise-fall*0.98);
  if (tt>21.5) c*=(CLOSE_H-tt)/0.5;
  return c;
}
function cumulativeEntry(tt,d){
  if (tt<=OPEN_H) return 0;
  if (tt>=CLOSE_H) return 1;
  const [c0,k]=RAMP[rampLevel(d).lv];
  return Math.min(1,1/(1+Math.exp(-(tt-(c0+0.75))*k*0.8)));
}
const mealFactor=tt=>0.35+1.9*Math.exp(-Math.pow(tt-12.4,2)/1.445)+1.6*Math.exp(-Math.pow(tt-18.4,2)/1.62);
/* ===== アトラクション別の需要プロファイル（人気順×時間帯パターン） =====
   chase:標準的な昼ピーク / rail:夕方に強い / dam:午前型・猛暑で増 / wheel:日没後の夜景ピーク
   factory:午前+午後の二山 / jazz:公演時刻(11,14,17,20時)前にスパイク / train:午前の家族連れ
   canoe:午前型・猛暑で増 / stardust:暗くなってから急増 / steam,moss,base,voyage:なだらか */
const g=(tt,c,s)=>Math.exp(-Math.pow(tt-c,2)/(2*s*s));
const PROFILE={
  chase:(tt,c)=>0.45+g(tt,13.8,3.0),
  rail:(tt,c)=>0.35+0.85*g(tt,16.5,3.2)+0.35*g(tt,11.0,1.8),
  dam:(tt,c)=>0.35+g(tt,11.5,2.6)+(c.temp>=30?0.25:0),
  wheel:(tt,c)=>0.35+0.55*g(tt,13.0,3.0)+0.85*g(tt,c.sunset+1.2,1.9),
  factory:(tt,c)=>0.40+0.80*g(tt,10.5,2.0)+0.55*g(tt,15.5,2.5),
  voyage:(tt,c)=>0.45+g(tt,13.5,3.0),
  steam:(tt,c)=>0.55+0.50*g(tt,14.0,4.5),
  train:(tt,c)=>0.40+0.95*g(tt,11.0,2.4),
  base:(tt,c)=>0.50+0.55*g(tt,13.0,4.0),
  canoe:(tt,c)=>0.40+g(tt,11.5,2.5)+(c.temp>=30?0.30:0),
  stardust:(tt,c)=>0.40+0.35*g(tt,13.0,3.0)+0.80/(1+Math.exp(-(tt-(c.sunset-0.3))*2.2)),
  moss:(tt,c)=>0.50+0.50*g(tt,14.0,4.5),
};
/* 悪天候時：屋内型は待ちが増え、屋外型は減る */
const INDOOR=new Set(["factory","base","chase"]);
function wxSpotMul(id){
  if (!WX.ok||WX.mul>=0.9) return 1;
  return INDOOR.has(id)?1.18:0.85;
}
/* ===== レストラン別の需要プロファイル =====
   hayate:カフェ&ベーカリー(朝・昼・カフェタイム) / brasserie:テーブルサービス昼夜二山
   pumpkin:収穫祭レストラン昼型 / luludining:ショーダイニング(公演前スパイク・夜公演が強い)
   damkitchen:ファミリーQS昼集中 / canteen:大型QS幅広い昼 / wheelcafe:午後ティー+夕景
   grove:森のディナー型 / stillhouse:大人のバー(夜のみ) / footlight:休憩型フラット
   wharfgrill:シーフード昼夜 / cargohall:最大級フードホール(広い二山・高回転)
   icecream:午後型・暑い日増 / tearoom:アフタヌーンティー */
const RPROFILE={
  hayate:(tt,c)=>0.50+0.9*g(tt,9.8,0.8)+1.4*g(tt,12.4,0.9)+1.0*g(tt,15.0,1.2)+1.1*g(tt,18.4,1.0),
  brasserie:(tt,c)=>0.30+1.8*g(tt,12.6,0.8)+1.7*g(tt,18.6,1.0),
  pumpkin:(tt,c)=>0.30+2.0*g(tt,12.2,0.9)+1.0*g(tt,18.2,0.9),
  luludining:(tt,c)=>0.55+1.5*g(tt,12.5,0.9)+1.6*g(tt,18.6,1.0),  /* 連続ショー化に伴い二山+底上げへ再設計 */
  damkitchen:(tt,c)=>0.35+1.9*g(tt,12.0,0.8)+0.9*g(tt,17.8,0.9),
  canteen:(tt,c)=>0.35+1.7*g(tt,12.3,1.1)+1.1*g(tt,18.2,1.0),
  wheelcafe:(tt,c)=>0.40+1.0*g(tt,14.8,1.4)+0.9*g(tt,c.sunset+0.5,1.0),
  grove:(tt,c)=>0.30+0.9*g(tt,12.5,0.9)+1.8*g(tt,18.8,1.1),
  stillhouse:(tt,c)=>0.15+2.0*g(tt,20.0,1.6),
  footlight:(tt,c)=>0.60+0.6*g(tt,13.0,2.5),
  wharfgrill:(tt,c)=>0.30+1.6*g(tt,12.5,0.9)+1.6*g(tt,18.6,1.0),
  cargohall:(tt,c)=>0.40+1.5*g(tt,12.6,1.3)+1.3*g(tt,18.4,1.2),
  lulus:(tt,c)=>0.40+1.3*g(tt,12.3,0.9)+0.8*g(tt,15.2,1.2),
  icecream:(tt,c)=>0.35+1.2*g(tt,14.5,1.8)+(c.temp>=28?0.5:0),
  tearoom:(tt,c)=>0.35+0.7*g(tt,12.3,0.8)+1.1*g(tt,15.0,1.3),
};
function calcWait(spot,d,tt,inPark,redist){
  if (tt<OPEN_H||tt>=CLOSE_H) return null;
  const crowd=inPark/50000;
  const ctx={sunset:sunsetH(),temp:WX.temp??20};
  let w;
  if (spot.type==="a"){
    const prof=(PROFILE[spot.id]||((x)=>0.45+g(x,13.8,3.0)))(tt,ctx);
    w=spot.pop*spot.waitCapMin*crowd*prof*redist*wxSpotMul(spot.id);
  }
  else {
    const rprof=(RPROFILE[spot.id]||mealFactor)(tt,ctx);
    w=spot.pop*spot.waitCapMin*(0.35+0.65*crowd)*rprof*0.62;
  }
  const mKey=dateKey(d)+"-"+Math.floor(tt)+"-"+Math.round((tt%1)*60)+"-"+spot.id;
  w*=0.88+rand01(mKey)*0.24;
  return Math.round(Math.min(spot.waitCapMin,Math.max(5,w))/5)*5;
}

const mapInner=document.getElementById("mapInner"),tip=document.getElementById("tip");
let activeId=null,currentWaits={},currentStatus={},fcMode=false,currentAtt=0,currentSimT=12;
const waitClass=w=>w==null?"w-closed":w<=30?"w-ok":w<=60?"w-warn":"w-bad";
const name=s=>LANG==="ja"?s.ja:s.en, area=s=>LANG==="ja"?s.areaJa:s.areaEn;
const rangeStr=r=>`${Math.floor(r[0]/100)}/${r[0]%100}–${Math.floor(r[1]/100)}/${r[1]%100}`;

function statusShort(st){
  return st.st==="maint"?t("stMaintS"):st.st==="insp"?t("stInspS"):st.st==="quake"?t("stQuakeS"):st.st==="sunset"?t("stSunsetS"):null;
}
function statusLong(st){
  if (st.st==="maint") return t("stMaint")+"（"+t("period")+" "+rangeStr(st.range)+"）";
  if (st.st==="insp"){
    let s=t("stInsp");
    if (st.n>1) s+=LANG==="ja"?`・本日${st.idx}/${st.n}回目`:` (${st.idx} of ${st.n} today)`;
    return s+(st.until?"・"+t("until")+fmtT(st.until):"・"+t("allday"));
  }
  if (st.st==="quake") return t("stQuake")+(st.until?"・"+t("until")+fmtT(st.until):"");
  if (st.st==="sunset") return t("stSunset")+"（"+fmtT(sunsetH())+"）";
  return null;
}
function buildPins(){
  SPOTS.forEach(s=>{
    const el=document.createElement("button");
    el.className="pin";el.id="pin-"+s.id;
    el.style.left=s.x+"%";el.style.top=s.y+"%";

    el.innerHTML=`<span class="chip" id="chip-${s.id}">

    el.addEventListener("click",e=>{e.stopPropagation();openDetail(s.id);});
    mapInner.appendChild(el);

  el.addEventListener("click",e=>{e.stopPropagation();openDetail("lulu-jazz");});

function showTip(s){
  activeId=s.id;
  document.querySelectorAll(".pin").forEach(p=>p.classList.remove("active"));
  document.getElementById("pin-"+s.id).classList.add("active");
  const w=currentWaits[s.id], st=currentStatus[s.id];
  let line;
  if (st&&st.st!=="open") line=statusLong(st);
  else if (w==null) line=new Date().getHours()<OPEN_H?t("before"):t("closed");
  else line=(fcMode?t("waitFc"):t("wait"))+w+t("min");
  let extra="";
  if (s.sunset&&(!st||st.st==="open")) extra="・"+t("sunsetInfo")+" "+fmtT(sunsetH());
  const pp=ppText(s.id,new Date(),currentSimT,currentAtt,st,fcMode);
  const ppLine=pp?`<div class="t-pp">🎫 ${pp}</div>`:"";
  tip.innerHTML=`<div class="t-name">${name(s)}</div><div class="t-wait">${line}</div>${ppLine}
    <div class="t-area">${s.type==="a"?t("attrType"):t("restType")}・${area(s)}${extra}</div>`;
  tip.classList.add("show");
  const W=mapInner.clientWidth,H=mapInner.clientHeight;
  const px=s.x/100*W, py=s.y/100*H;
  const tw=tip.offsetWidth, th=tip.offsetHeight;
  let left=Math.max(6,Math.min(W-tw-6,px-tw/2));
  let top=py-th-36;
  if (top<6) top=Math.min(H-th-6,py+16);
  tip.style.left=left+"px"; tip.style.top=top+"px";
}
function pulsePin(id){
  const p=document.getElementById("pin-"+id);
  if(!p) return;
  p.classList.remove("hilite"); void p.offsetWidth;
  p.classList.add("hilite");
  clearTimeout(p._ht); p._ht=setTimeout(()=>p.classList.remove("hilite"),3000);
}
function hideTip(){tip.classList.remove("show");activeId=null;document.querySelectorAll(".pin").forEach(p=>p.classList.remove("active"));}

function catOf(s){return s.cat?s.cat:(s.type==="a"?"attraction":"dining");}
function renderLists(){
  const mk=(list,panel,cls)=>{
    const sorted=[...list].sort((a,b)=>(currentWaits[b.id]??-1)-(currentWaits[a.id]??-1));
    panel.innerHTML=sorted.map((s,i)=>{
      const w=currentWaits[s.id],st=currentStatus[s.id];
      let wc,wtxt,down="";
      if (st&&st.st!=="open"){wc="w-maint";wtxt=statusShort(st);down="down";}
      else if (w==null){wc="w-closed";wtxt=new Date().getHours()<OPEN_H?t("before"):t("closed");}
      else {wc=waitClass(w);wtxt=`${w}<small> ${t("min")}</small>`;}
      const pp=ppText(s.id,new Date(),currentSimT,currentAtt,st,fcMode);
      const ppHtml=pp?` <span class="ppb">${pp}</span>`:"";
      return `<div class="row ${cls} ${down}" data-id="${s.id}" tabindex="0" role="button">
        <div class="r-rank">${i+1}</div>
        <div class="r-body"><div class="r-name">${name(s)}</div><div class="r-area">${area(s)}${ppHtml}</div></div>
        <div class="r-wait ${wc}">${wtxt}</div></div>`;
    }).join("");
    panel.querySelectorAll(".row").forEach(r=>{
      const go=()=>{const s=SPOTS.find(x=>x.id===r.dataset.id);

      r.addEventListener("click",go);
      r.addEventListener("keydown",e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();go();}});
    });
  };
  mk(SPOTS.filter(s=>catOf(s)==="attraction"),document.getElementById("panelAttr"),"");
  mk(SPOTS.filter(s=>catOf(s)!=="attraction"&&catOf(s)!=="dining"),document.getElementById("panelFac"),"fac");
  mk(SPOTS.filter(s=>catOf(s)==="dining"),document.getElementById("panelRest"),"rest");
}

  if (st.st==="cancel") return {cls:"sc-maint",txt:t("cancelShow")};
  if (st.st==="live") return {cls:"sc-live",txt:t("liveShow")+"｜"+fmtT(st.start)+"–"+fmtT(st.end)};
  if (st.st==="soon") return {cls:"sc-soon",txt:t("soonShow")+fmtT(st.start)+"（"+t("minTo")+st.minutesTo+(LANG==="ja"?"分":" min")+"）"};
  if (st.st==="done") return {cls:"sc-done",txt:t("doneShow")};
  return {cls:"sc-up",txt:t("nextShow")+fmtT(st.start)+"–"+fmtT(st.end)};
}

function openDetail(id){
  const now=new Date();
  const tt=now.getHours()+now.getMinutes()/60;
  const g=GUIDE[id]||{};
  const spot=SPOTS.find(s=>s.id===id);
  const ent=ENTERTAINMENT.find(e=>e.id===id);
  let catLabel,nm,ar,live="";
  if (spot){
    const cat=catOf(spot);
    catLabel=(LANG==="ja"?g.catJa:g.catEn)||({attraction:t("attr"),dining:t("restTitle"),wellness:LANG==="ja"?"リラックス施設":"Wellness",service:LANG==="ja"?"サービス・休憩":"Service"})[cat];
    nm=name(spot); ar=area(spot);
    const w=currentWaits[id],st=currentStatus[id];
    const wl=(cat==="wellness"||cat==="service")?(LANG==="ja"?(g.waitLabelJa||t("useWait")):(g.waitLabelEn||t("useWait"))):(LANG==="ja"?"待ち時間":"Wait time");
    let line;
    if (st&&st.st!=="open") line=statusLong(st);
    else if (w==null) line=now.getHours()<OPEN_H?t("before"):t("closed");
    else line=`${wl} <b>${fcMode?"約"+w+t("min")+(LANG==="ja"?"（ピーク予測）":" (peak est.)"):"約"+w+t("min")}</b>`;
    const pp=ppText(id,now,currentSimT,currentAtt,st,fcMode);
    live=`<div class="sh-live">${line}${pp?`<br><span class="ppb2">🎫 ${pp}</span>`:""}</div>`;
  } else if (ent){
    catLabel=(LANG==="ja"?g.catJa:g.catEn)||"";
    nm=LANG==="ja"?ent.ja:ent.en; ar=LANG==="ja"?ent.venueJa:ent.venueEn;
    const st=showStatus(ent,now,tt);
    const x=showStatusText(ent,st);
    const times=showTimes(ent,now);
    const timeLine=ent.timeGen?(LANG==="ja"?"9:30〜21:30・30分おき（各30分・完全入替制）":"9:30–21:30, every 30 min"):times.map(fmtT).join(" / ");
    live=`<div class="sh-live"><b>${x.txt}</b><br>${timeLine}</div>`;
  } else return;
  const tags=(LANG==="ja"?g.tagsJa:g.tagsEn)||[];
  const tagHtml=tags.length?`<div class="sh-tags">${tags.map(x=>`<span class="sh-tag${x.includes("足湯")||x.includes("footbath")?" warn":""}">${x}</span>`).join("")}</div>`:"";
  const meta=(g.styleJa)?`<div class="sh-meta">${LANG==="ja"?g.styleJa:g.styleEn}｜${LANG==="ja"?g.cuisineJa:g.cuisineEn}</div>`:"";
  const menus=(g.menus&&g.menus.length)?`<div class="sh-menus"><div class="m-title">${t("menuTitle")}</div><ul>${g.menus.slice(0,4).map(m=>`<li>${m}</li>`).join("")}</ul></div>`:"";
  let notes="";
  if (id==="footlight") notes=`<div class="sh-note">⚠ ${t("footNote2")}</div>`;
  if (g.alcohol) notes+=`<div class="sh-note">🍸 ${t("alcoholNote")}</div>`;
  document.getElementById("sheetBody").innerHTML=`
    <div class="sh-cat">${catLabel||""}</div>
    <div class="sh-name">${nm}</div>
    <div class="sh-area">${ar}</div>
    ${live}${tagHtml}
    ${g.tagJa?`<div class="sh-tagline">${LANG==="ja"?g.tagJa:g.tagEn}</div>`:""}
    ${g.dJa?`<div class="sh-desc">${LANG==="ja"?g.dJa:g.dEn}</div>`:""}
    ${meta}${menus}${notes}`;
  backdrop.classList.add("show");
}

function refresh(){
  const now=new Date();
  const tt=now.getHours()+now.getMinutes()/60;
  fcMode=tt<OPEN_H;
  const simT=fcMode?14.0:tt;
  const att=dailyAttendance(now);
  const inPark=fcMode?att.total:Math.round(att.total*occupancyCurve(tt,now)/100)*100;
  const entered=Math.round(att.total*cumulativeEntry(tt,now));
  const redist=redistFactor(now,simT);

  document.getElementById("tCrowd").textContent=fcMode?t("crowdFc"):t("crowdNow");
  const gr=document.getElementById("gaugeRight");
  if (fcMode){
    const lv=att.total>=70000?3:att.total>=55000?2:att.total>=40000?1:0;
    const lvColor=["#2e6b45","#b07514","#b4452f","#8a2418"][lv];
    gr.innerHTML=`<span class="fc-level" style="color:${lvColor}">${t("fcLevels")[lv]}</span>`;
    document.getElementById("gaugeFill").style.width=Math.min(100,att.total/MAX_CAP*100)+"%";
  } else {
    gr.innerHTML=`<span id="crowdNum">${inPark.toLocaleString()}</span><small> / 75,000</small>`;
    document.getElementById("gaugeFill").style.width=Math.min(100,inPark/MAX_CAP*100)+"%";
  }
  const restricted=!fcMode&&(tt>=OPEN_H&&tt<CLOSE_H)&&(inPark>=MAX_CAP*0.99||(att.total>=MAX_CAP&&entered>=MAX_CAP*0.985));
  const rb=document.getElementById("restrictBanner");
  if (fcMode&&att.total>=MAX_CAP){rb.textContent=t("restrictFc");rb.classList.add("show");}
  else {rb.textContent=t("restrictBanner");rb.classList.toggle("show",restricted);}

  const inbShare=Math.round(att.inbound/(att.domestic+att.inbound)*100);
  let note=`${t("est")} ${Math.min(MAX_CAP,att.domestic+att.inbound).toLocaleString()}${t("people")}（${t("dom")} ${att.domestic.toLocaleString()} ／ ${t("inb")} ${att.inbound.toLocaleString()}・${inbShare}%）`;
  const tags=[];
  if (att.holiday) tags.push(LANG==="ja"?"祝日「"+att.holiday[0]+"」":"Holiday: "+att.holiday[1]);
  const sn=LANG==="ja"?att.season.ja:att.season.en; if(sn)tags.push(sn);
  const inbn=LANG==="ja"?att.inb.ja:att.inb.en; if(inbn)tags.push(inbn+(LANG==="ja"?"（訪日増）":" (inbound surge)"));
  const rlv=rampLevel(now);
  if (rlv.lv===3) tags.push(LANG==="ja"?`特異日「${rlv.name}」・開園ダッシュ最大`:`Surge day: opening rush max`);
  else if (rlv.lv===2) tags.push(LANG==="ja"?"連休中日（超混雑・開園ダッシュ強）":"Mid-holiday peak (heavy opening rush)");
  else if (rlv.lv===1) tags.push(LANG==="ja"?"混雑日（開園ダッシュあり）":"Busy day (opening rush)");
  if (tags.length) note+=" ／ "+tags.join("・");
  document.getElementById("crowdNote").textContent=note+" "+t("basis");

  const st=document.getElementById("parkStatus");
  if (tt>=OPEN_H&&tt<CLOSE_H){st.textContent=restricted?t("restrict"):t("open");st.className="status-chip "+(restricted?"status-closed":"status-open");}
  else if (tt<OPEN_H){st.textContent=t("before");st.className="status-chip status-before";}
  else {st.textContent=t("closed");st.className="status-chip status-closed";}

  document.getElementById("tSort").textContent=fcMode?t("sortFc"):t("sortNow");
  {
    const attrs=SPOTS.filter(s=>catOf(s)==="attraction");
    const openN=attrs.filter(s=>spotStatus(s,now,simT).st==="open").length;
    document.getElementById("tOpenCnt").textContent=(LANG==="ja"?`稼働 ${openN}/${attrs.length}・`:`${openN}/${attrs.length} running・`);
    const rn=SPOTS.filter(s=>catOf(s)==="dining").length;
    document.getElementById("tRestCnt").textContent=(LANG==="ja"?`${rn}店舗`:`${rn} locations`);
    const fn=SPOTS.filter(s=>catOf(s)!=="attraction"&&catOf(s)!=="dining").length;
    document.getElementById("tFacCnt").textContent=(LANG==="ja"?`${fn}施設`:`${fn} facilities`);
  }
  renderShows();
  renderBanner();

  currentWaits={};currentStatus={};currentAtt=att.total;currentSimT=simT;
  SPOTS.forEach(s=>{
    const stt=spotStatus(s,now,simT);
    currentStatus[s.id]=stt;
    let w=null;
    if (stt.st==="open"&&(fcMode||(tt>=OPEN_H&&tt<CLOSE_H))) w=calcWait(s,now,simT,inPark,redist);
    currentWaits[s.id]=w;
    const chip=document.getElementById("chip-"+s.id),min=document.getElementById("min-"+s.id);
    if (stt.st!=="open"){chip.className="chip w-maint";min.textContent=statusShort(stt);}
    else if (w==null){chip.className="chip w-closed";min.textContent="--";}
    else {chip.className="chip "+waitClass(w);min.textContent=w+t("min");}
  });
  renderLists();
  if (activeId){const s=SPOTS.find(x=>x.id===activeId);if(s)showTip(s);}
  document.getElementById("footNote").innerHTML=
    t("foot")+`<span class="upd">${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}:${String(now.getSeconds()).padStart(2,"0")}</span><br>`+t("demo");
}

function tickClock(){
  const now=new Date();
  document.getElementById("clock").textContent=
    String(now.getHours()).padStart(2,"0")+":"+String(now.getMinutes()).padStart(2,"0")+":"+String(now.getSeconds()).padStart(2,"0");
  const hol=holidayPair(now);
  document.getElementById("dateline").innerHTML=LANG==="ja"
    ? `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日（${WD_JA[now.getDay()]}）`+(hol?` <span class="holiday">☀ ${hol[0]}</span>`:"")
    : `${WD_EN[now.getDay()]}, ${now.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}`+(hol?` <span class="holiday">☀ ${hol[1]}</span>`:"");
  document.getElementById("cd").textContent=60-now.getSeconds();
  if (now.getSeconds()===0) refresh();
}

buildPins();
applyLang();
tickClock();
Promise.all([fetchWeather(),fetchQuake()]).then(refresh);
setInterval(tickClock,1000);
setInterval(fetchWeather,600000);
setInterval(fetchQuake,300000);
</script>
</body>
</html>
